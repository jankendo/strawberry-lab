# Required: Supabase client-side settings for Streamlit app
# Never put SUPABASE_SERVICE_ROLE_KEY in this file.
SUPABASE_URL = "https://<your-project-ref>.supabase.co"
SUPABASE_ANON_KEY = "<your-anon-key>"

# Optional
APP_TIMEZONE = "Asia/Tokyo"

# Recommended for stable 30-day login persistence (set a long random string)
# If not set, a process-local temporary random secret is used and persistence may reset after restart/redeploy.
APP_COOKIE_SECRET = "<set-a-long-random-secret>"

# Optional: hide Streamlit host toolbar/chrome for product-like UI
APP_HIDE_HOST_CHROME = true

# Optional: distributed cache invalidation (multi-instance)
# If unset, cache invalidation is process-local and sticky sessions are recommended.
# CACHE_REDIS_URL = "redis://localhost:6379/0"
# CACHE_NAMESPACE = "ichigodb"
# APP_EXPECT_STICKY_SESSIONS = true
